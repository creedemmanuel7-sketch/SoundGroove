<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundGroove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">SoundGroove</span>
        </div>
        <div class="topbar-actions">
          <button type="button" class="btn ghost" id="btn-add-files">Ajouter fichiers</button>
          <button type="button" class="btn primary" id="btn-scan-folder">Scanner un dossier</button>
        </div>
      </header>

      <main class="main-stage">
        <section class="empty-state" id="empty-state">
          <div class="empty-atmosphere" aria-hidden="true"></div>
          <p class="empty-brand">SoundGroove</p>
          <h1 class="empty-headline">Ta bibliothèque locale, proprement affichée</h1>
          <p class="empty-sub">
            Importe un dossier ou des fichiers audio. Les titres, artistes et pochettes viennent
            des tags embarqués — pas de scraping.
          </p>
          <div class="empty-cta">
            <button type="button" class="btn primary lg" id="btn-empty-scan">
              Scanner un dossier
            </button>
            <button type="button" class="btn ghost lg" id="btn-empty-files">
              Ajouter des fichiers
            </button>
          </div>
        </section>

        <section class="library-view hidden" id="library-view">
          <div class="library-head">
            <div>
              <h2 class="library-title">Bibliothèque</h2>
              <p class="library-meta" id="library-meta">0 titres</p>
            </div>
            <p class="scan-hint" id="scan-hint" hidden></p>
          </div>
          <div class="track-list" id="track-list" role="list"></div>
        </section>
      </main>

      <aside class="now-playing" id="now-playing" hidden>
        <div class="np-cover-wrap">
          <img class="np-cover" id="np-cover" alt="" hidden />
          <div class="np-cover-fallback" id="np-cover-fallback" aria-hidden="true"></div>
        </div>
        <div class="np-meta">
          <p class="np-title" id="np-title">Rien en lecture</p>
          <p class="np-artist" id="np-artist">—</p>
          <p class="np-album" id="np-album"></p>
        </div>
        <div class="np-controls">
          <button type="button" class="icon-btn" id="btn-prev" aria-label="Précédent">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
            </svg>
          </button>
          <button type="button" class="icon-btn play" id="btn-play" aria-label="Lecture / pause">
            <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" id="icon-play">
              <path fill="currentColor" d="M8 5v14l11-7z" />
            </svg>
            <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" id="icon-pause" hidden>
              <path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z" />
            </svg>
          </button>
          <button type="button" class="icon-btn" id="btn-next" aria-label="Suivant">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M16 6h2v12h-2zM6 18l8.5-6L6 6z" />
            </svg>
          </button>
        </div>
        <div class="np-status">
          <span id="player-backend">—</span>
          <button type="button" class="linkish" id="btn-remote">Remote</button>
        </div>
      </aside>
    </div>

    <div class="toast" id="toast" hidden></div>
    <audio id="html-audio" preload="metadata"></audio>
    <script type="module" src="main.js"></script>
  </body>
</html>
